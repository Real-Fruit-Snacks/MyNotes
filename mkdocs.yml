site_name: My Notes
theme:
  name: material
  favicon: images/favicon.svg
  icon:
    logo: material/shield-lock
  palette:
    scheme: catppuccin-mocha
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/catppuccin.css

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
      clickable_checkbox: false
